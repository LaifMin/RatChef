<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RatChef AI - Chat con i Grandi Chef</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d0f13;
            font-family: 'Outfit', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #1a1c23 0%, #14161b 100%);
            padding: 15px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        #title {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5a623, #e8791d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #char-index { color: #aaa; font-size: 14px; font-weight: 400; }

        #display-char-tt {
            font-weight: 600;
            font-size: 16px;
            padding: 4px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .char-cannavacciuolo { color: #ff6b35; background: rgba(255,107,53,0.15); }
        .char-mysterychef    { color: #a366ff; background: rgba(163,102,255,0.15); }
        .char-ade            { color: #4ecdc4; background: rgba(78,205,196,0.15); }

        #answers {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            color: white;
            scroll-behavior: smooth;
        }

        #answers::-webkit-scrollbar { width: 6px; }
        #answers::-webkit-scrollbar-track { background: transparent; }
        #answers::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        #answers p {
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 75%;
            word-wrap: break-word;
            color: white;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            background: linear-gradient(135deg, #1e3a5f, #1a3050) !important;
            margin-left: auto !important;
            text-align: right;
            border-bottom-right-radius: 4px;
        }

        .msg-ai {
            background: rgba(255,255,255,0.06) !important;
            margin-right: auto !important;
            text-align: left;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #f5a623;
        }

        .msg-system {
            background: rgba(78,205,196,0.08) !important;
            margin: 0 auto !important;
            text-align: center;
            border-radius: 8px;
            font-style: italic;
            color: #4ecdc4 !important;
            font-size: 13px !important;
            max-width: 90% !important;
        }

        .msg-error {
            background: rgba(255,80,80,0.12) !important;
            border-left: 3px solid #ff5050 !important;
            margin-right: auto !important;
        }

        .msg-private { opacity: 0.7; font-style: italic; }

        .msg-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }

        .msg-ai .msg-label   { color: #f5a623; }
        .msg-user .msg-label { color: #6ba3d6; }

        #chatForm {
            padding: 16px 20px;
            background: linear-gradient(135deg, #1a1c23 0%, #14161b 100%);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background-color: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.3s, background-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #f5a623;
            background-color: rgba(255,255,255,0.08);
        }

        input[type="text"]::placeholder { color: #666; }

        button {
            padding: 12px 20px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #sendBt { background: linear-gradient(135deg, #f5a623, #e8791d); }
        #sendBt:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(245,166,35,0.3); }

        #changeBt { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); }
        #changeBt:hover:not(:disabled) { background: rgba(255,255,255,0.12); }

        #pdfBtn {
            background: rgba(78,205,196,0.15);
            border: 1px solid rgba(78,205,196,0.3);
            color: #4ecdc4;
            padding: 12px 16px;
            font-size: 13px;
            display: none;
        }
        #pdfBtn:hover:not(:disabled) { background: rgba(78,205,196,0.25); }

        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .whisper-label {
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .whisper-label input[type="checkbox"] { accent-color: #f5a623; }
    </style>
</head>
<body>
    <header>
        <span id="title">🐀 RatChef AI</span>
        <div class="header-right">
            <span id="char-index">Stai parlando con:</span>
            <span class="current-char char-cannavacciuolo" id="display-char-tt">Cannavacciuolo</span>
        </div>
    </header>

    <div id="answers"></div>

    <form id="chatForm" onsubmit="sendMessage(event)">
        <input type="text" id="chatMessage" placeholder="Chiedi una ricetta, un consiglio culinario...">
        <button type="submit" id="sendBt">Invia</button>
        <button type="button" id="changeBt" onclick="swapCharacter()">Cambia Chef</button>
        <label class="whisper-label">
            <input type="checkbox" id="privateChat"> Sussurra
        </label>
        <!-- PDF nascosto: visibile solo per Prof. Ade -->
        <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="uploadPDF(this)">
        <button type="button" id="pdfBtn" onclick="document.getElementById('pdfInput').click()">
            📄 Carica PDF
        </button>
    </form>

    <script>
        // ----------------------------------------------------------------
        // Stato applicazione
        // ----------------------------------------------------------------
        const characters = ['cannavacciuolo', 'mysterychef', 'ade'];
        let currentCharIndex = 0;

        const characterClasses = ['char-cannavacciuolo', 'char-mysterychef', 'char-ade'];
        const characterNames   = { cannavacciuolo: 'Cannavacciuolo', mysterychef: 'Mystery Chef', ade: 'Prof. Ade' };

        // Storico messaggi per personaggio: [{role:'human'|'ai', content:'...'}]
        // Usato sia per renderizzare la chat che per mandare la history al backend
        const characterHistory = { cannavacciuolo: [], mysterychef: [], ade: [] };

        // ----------------------------------------------------------------
        // Helper
        // ----------------------------------------------------------------
        function getCurrentChar()  { return characters[currentCharIndex]; }
        function getDisplayName(k) { return characterNames[k] || k; }
        function setUIBusy(busy) {
            ['chatMessage', 'sendBt', 'changeBt', 'pdfBtn'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = busy;
            });
            if (busy) document.getElementById('sendBt').textContent = 'Attendi...';
            else      document.getElementById('sendBt').textContent = 'Invia';
        }

        // ----------------------------------------------------------------
        // Rendering messaggi
        // ----------------------------------------------------------------
        function addMessage(content, role, isPrivate = false) {
            const wrap = document.getElementById('answers');
            const p    = document.createElement('p');

            if (role === 'system') {
                p.className = 'msg-system';
                p.textContent = content;
            } else if (role === 'error') {
                p.className = 'msg-error msg-ai';
                p.textContent = content;
            } else if (role === 'human') {
                p.className = `msg-user${isPrivate ? ' msg-private' : ''}`;
                const lbl = document.createElement('span');
                lbl.className = 'msg-label';
                lbl.textContent = 'Tu' + (isPrivate ? ' [sussurro]' : '');
                p.appendChild(lbl);
                p.appendChild(document.createTextNode(content));
            } else {
                // risposta AI
                p.className = `msg-ai${isPrivate ? ' msg-private' : ''}`;
                const lbl = document.createElement('span');
                lbl.className = 'msg-label';
                lbl.textContent = getDisplayName(role) + (isPrivate ? ' [sussurro]' : '');
                p.appendChild(lbl);
                p.appendChild(document.createTextNode(content));
            }

            wrap.appendChild(p);
            wrap.scrollTop = wrap.scrollHeight;
        }

        // ----------------------------------------------------------------
        // Cambio personaggio
        // ----------------------------------------------------------------
        function swapCharacter() {
            currentCharIndex = (currentCharIndex + 1) % characters.length;
            updateCharacterDisplay();
            renderCharacterHistory();
        }

        function updateCharacterDisplay() {
            const char = getCurrentChar();
            const el   = document.getElementById('display-char-tt');
            el.textContent = getDisplayName(char);
            el.className   = `current-char ${characterClasses[currentCharIndex]}`;

            // PDF button solo per Ade
            document.getElementById('pdfBtn').style.display = char === 'ade' ? 'inline-flex' : 'none';
        }

        function renderCharacterHistory() {
            const wrap = document.getElementById('answers');
            wrap.innerHTML = '';
            const char = getCurrentChar();
            characterHistory[char].forEach(msg => {
                addMessage(msg.content, msg.role === 'human' ? 'human' : char, msg.private || false);
            });
        }

        // ----------------------------------------------------------------
        // Invio messaggio chat
        // ----------------------------------------------------------------
        async function sendMessage(event) {
            event.preventDefault();
            const input   = document.getElementById('chatMessage');
            const message = input.value.trim();
            if (!message) return;

            const char      = getCurrentChar();
            const isPrivate = document.getElementById('privateChat').checked;

            // Aggiungi il messaggio utente alla UI e alla history
            addMessage(message, 'human', isPrivate);
            characterHistory[char].push({ role: 'human', content: message, private: isPrivate });
            input.value = '';

            setUIBusy(true);

            // Prepara history da mandare al backend (solo role + content, no private)
            const historyPayload = characterHistory[char]
                .slice(0, -1)   // escludi l'ultimo (quello appena aggiunto, non ancora risposto)
                .map(m => ({ role: m.role, content: m.content }));

            try {
                const resp = await fetch(`/${char}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ question: message, history: historyPayload })
                });
                const data = await resp.json();

                if (data.error) {
                    addMessage(data.error, 'error');
                } else {
                    addMessage(data.answer, char, isPrivate);
                    characterHistory[char].push({ role: 'ai', content: data.answer, private: isPrivate });
                }
            } catch (err) {
                console.error(err);
                addMessage('Errore di connessione con lo chef.', 'error');
                // Rimuovi l'ultimo messaggio utente dalla history (la richiesta e fallita)
                characterHistory[char].pop();
            } finally {
                setUIBusy(false);
                document.getElementById('chatMessage').focus();
            }
        }

        // ----------------------------------------------------------------
        // Upload PDF (solo Prof. Ade)
        // ----------------------------------------------------------------
        async function uploadPDF(input) {
            const file = input.files[0];
            if (!file) return;
            input.value = '';

            addMessage(`📄 PDF caricato: ${file.name} — elaborazione in corso...`, 'system');
            setUIBusy(true);

            const formData = new FormData();
            formData.append('pdf', file);

            try {
                const resp = await fetch('/upload_pdf', { method: 'POST', body: formData });
                const data = await resp.json();

                const answer = data.answer || data.error || 'Risposta non valida dal server.';
                addMessage(answer, 'ade');
                characterHistory['ade'].push({ role: 'ai', content: answer });
            } catch (err) {
                console.error(err);
                addMessage('Errore di connessione durante il caricamento del PDF.', 'error');
            } finally {
                setUIBusy(false);
            }
        }

        // ----------------------------------------------------------------
        // Init
        // ----------------------------------------------------------------
        updateCharacterDisplay();
    </script>
</body>
</html>
