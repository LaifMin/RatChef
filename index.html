<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RatChef AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0f13;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #1a1c23, #14161b);
            padding: 15px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #title {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5a623, #e8791d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #chef-tag {
            font-size: 14px;
            font-weight: 600;
            color: #f5a623;
            background: rgba(245,166,35,0.15);
            padding: 4px 14px;
            border-radius: 20px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .msg {
            max-width: 75%;
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            color: white;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }

        .msg-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            opacity: 0.55;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .msg.user   { background: linear-gradient(135deg,#2a2d35,#1e2028); margin-left: auto; border-bottom-right-radius: 4px; }
        .msg.ai     { background: linear-gradient(135deg,#1e2a1a,#192316); border: 1px solid rgba(245,166,35,0.15); border-bottom-left-radius: 4px; }
        .msg.system { background: rgba(255,255,255,0.05); color: #aaa; font-size: 12px; font-style: italic; max-width: 100%; text-align: center; margin: 4px auto; }
        .msg.error  { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.2); }

        form {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            background: #14161b;
            border-top: 1px solid rgba(255,255,255,0.06);
            align-items: center;
        }

        #input {
            flex: 1;
            background: #1e2028;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px 14px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        #input:focus { border-color: rgba(245,166,35,0.5); }
        #input::placeholder { color: #555; }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #send-btn {
            background: linear-gradient(135deg,#f5a623,#e8791d);
            color: white;
        }
        #send-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }

        #pdf-btn {
            background: rgba(255,255,255,0.07);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #pdf-btn:hover:not(:disabled) { background: rgba(255,255,255,0.12); }
    </style>
</head>
<body>

<header>
    <span id="title">🐀 RatChef AI</span>
    <span id="chef-tag">Remy</span>
</header>

<div id="messages"></div>

<form onsubmit="sendMessage(event)">
    <input id="input" type="text" placeholder="Chiedi una ricetta, un consiglio culinario..." autocomplete="off">
    <button id="send-btn" type="submit">Invia</button>
    <input id="pdf-input" type="file" accept=".pdf" style="display:none" onchange="uploadPDF(this)">
    <button id="pdf-btn" type="button" onclick="document.getElementById('pdf-input').click()">📄 Carica PDF</button>
</form>

<script>
    const history = [];

    function setbusy(busy) {
        ['input','send-btn','pdf-btn'].forEach(id => document.getElementById(id).disabled = busy);
        document.getElementById('send-btn').textContent = busy ? 'Attendi...' : 'Invia';
    }

    function addMsg(content, type) {
        const wrap = document.getElementById('messages');
        const p    = document.createElement('p');
        p.className = `msg ${type}`;
        if (type === 'user' || type === 'ai') {
            const lbl = document.createElement('span');
            lbl.className   = 'msg-label';
            lbl.textContent = type === 'user' ? 'Tu' : 'Remy';
            p.appendChild(lbl);
        }
        p.appendChild(document.createTextNode(content));
        wrap.appendChild(p);
        wrap.scrollTop = wrap.scrollHeight;
    }

    async function sendMessage(e) {
        e.preventDefault();
        const input   = document.getElementById('input');
        const message = input.value.trim();
        if (!message) return;

        addMsg(message, 'user');
        history.push({ role: 'human', content: message });
        input.value = '';
        setbusy(true);

        try {
            const res  = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: message, history: history.slice(0, -1) })
            });
            const data = await res.json();
            const reply = data.answer || data.error || 'Nessuna risposta.';
            addMsg(reply, data.error ? 'error' : 'ai');
            if (!data.error) history.push({ role: 'ai', content: reply });
        } catch {
            addMsg('Errore di connessione.', 'error');
            history.pop();
        } finally {
            setbusy(false);
            document.getElementById('input').focus();
        }
    }

    async function uploadPDF(input) {
        const file = input.files[0];
        if (!file) return;
        input.value = '';

        addMsg(`📄 ${file.name} — elaborazione in corso...`, 'system');
        setbusy(true);

        const form = new FormData();
        form.append('pdf', file);

        try {
            const res  = await fetch('/chat', { method: 'POST', body: form });
            const data = await res.json();
            addMsg(data.answer || data.error || 'Nessuna risposta.', data.error ? 'error' : 'ai');
        } catch {
            addMsg('Errore durante il caricamento del PDF.', 'error');
        } finally {
            setbusy(false);
        }
    }
</script>
</body>
</html>
