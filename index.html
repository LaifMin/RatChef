<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RatChef AI - Chat con i Grandi Chef</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0f13;
            font-family: 'Outfit', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1a1c23 0%, #14161b 100%);
            padding: 15px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        #title {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5a623, #e8791d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #char-index {
            color: #aaa;
            font-size: 14px;
            font-weight: 400;
        }

        #display-char-tt {
            font-weight: 600;
            font-size: 16px;
            padding: 4px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        /* Character colors */
        .char-cannavacciuolo { color: #ff6b35; background: rgba(255,107,53,0.15); }
        .char-mysterychef { color: #a366ff; background: rgba(163,102,255,0.15); }
        .char-ade { color: #4ecdc4; background: rgba(78,205,196,0.15); }

        /* Chat messages area */
        #answers {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            color: white;
            scroll-behavior: smooth;
        }

        #answers::-webkit-scrollbar {
            width: 6px;
        }
        #answers::-webkit-scrollbar-track {
            background: transparent;
        }
        #answers::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        #answers p {
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 75%;
            word-wrap: break-word;
            color: white;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            background: linear-gradient(135deg, #1e3a5f, #1a3050) !important;
            margin-left: auto !important;
            text-align: right;
            border-bottom-right-radius: 4px;
        }

        .msg-ai {
            background: rgba(255,255,255,0.06) !important;
            margin-right: auto !important;
            text-align: left;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #f5a623;
        }

        .msg-private {
            opacity: 0.7;
            font-style: italic;
        }

        .msg-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }

        .msg-ai .msg-label { color: #f5a623; }
        .msg-user .msg-label { color: #6ba3d6; }

        /* Input form */
        #chatForm {
            padding: 16px 20px;
            background: linear-gradient(135deg, #1a1c23 0%, #14161b 100%);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background-color: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.3s, background-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #f5a623;
            background-color: rgba(255,255,255,0.08);
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        button {
            padding: 12px 20px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #sendBt {
            background: linear-gradient(135deg, #f5a623, #e8791d);
        }
        #sendBt:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(245,166,35,0.3);
        }

        #changeBt {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
        }
        #changeBt:hover:not(:disabled) {
            background: rgba(255,255,255,0.12);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .whisper-label {
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .whisper-label input[type="checkbox"] {
            accent-color: #f5a623;
        }

        /* Loading animation */
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
    </style>
</head>
<body>
    <header>
        <span id="title">🐀 RatChef AI</span>
        <div class="header-right">
            <span id="char-index">Stai parlando con:</span>
            <span class="current-char char-cannavacciuolo" id="display-char-tt">Cannavacciuolo</span>
        </div>
    </header>

    <div id="answers">

    </div>

    <form id="chatForm" onsubmit="sendMessageUP(event)">
        <input type="text" name="message" id="chatMessage" placeholder="Chiedi una ricetta, un consiglio culinario...">
        <button type="submit" id="sendBt">Invia</button>
        <button type="button" id="changeBt" onclick="swapCharacter()">Cambia Chef</button>
        <label class="whisper-label">
            <input type="checkbox" id="privateChat"> Sussurra
        </label>
    </form>

    <script>

        const characters = ['cannavacciuolo', 'mysterychef', 'ade'];
        let currentCharIndex = 0;
        const characterClasses = ['char-cannavacciuolo', 'char-mysterychef', 'char-ade'];
        const characterNames = {
            cannavacciuolo: 'Cannavacciuolo',
            mysterychef: 'Mystery Chef',
            ade: 'Prof. Ade'
        };
        const characterChats = {
            cannavacciuolo: [],
            mysterychef: [],
            ade: []
        };

        function getCurrentCharacterClass() {
            return characterClasses[currentCharIndex];
        }

        function getCurrentCharacter() {
            return characters[currentCharIndex];
        }

        function getDisplayName(charKey) {
            return characterNames[charKey] || charKey;
        }


        function swapCharacter() {
            currentCharIndex = (currentCharIndex + 1) % characters.length;
            updateCharacterDisplay();
            loadCharacterChat();
            
            const input = document.getElementById('chatMessage');
            input.focus();
        }

        function loadCharacterChat() {
            const respondsDiv = document.getElementById('answers');
            const currentChar = getCurrentCharacter();

            respondsDiv.innerHTML = '';

            const messages = characterChats[currentChar];
            messages.forEach(msg => {
                addMessage(msg.content, msg.char, msg.private);
            });

            scrollToBottom();
        }

        function updateCharacterDisplay() {
            const displayElement = document.getElementById('display-char-tt');
            const swapBtn = document.getElementById('changeBt');
            const currentChar = getCurrentCharacter();
            
            displayElement.textContent = getDisplayName(currentChar);
            displayElement.className = `current-char ${getCurrentCharacterClass()}`;
            
            swapBtn.innerHTML = `Cambia Chef`;
        }


        async function sendMessageUP(event){
            event.preventDefault();
            const input = document.getElementById("chatMessage");
            const sendBtn = document.getElementById("sendBt");
            const swapBtn = document.getElementById("changeBt");
            const respondsDiv = document.getElementById("answers");
            const message = input.value.trim();
            const isPrivate = document.getElementById("privateChat").checked;

            if(message === ""){
                return;
            }

            const currentChar = getCurrentCharacter();

            input.disabled = true;
            sendBtn.disabled = true;
            swapBtn.disabled = true;
            sendBtn.textContent = 'Caricamento...';

            addMessage(message, 'User', isPrivate);
            characterChats[currentChar].push({ char: 'User', content: message, private: isPrivate });

            try {
                const response = await fetch(`/${currentChar}`, {
                    method: "POST",
                    body: JSON.stringify({ question: message, private: isPrivate }),
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                });
                
                const data = await response.json();
                const answer = data.answer;
                characterChats[currentChar].push({ char: currentChar, content: answer, private: isPrivate });
                addMessage(answer, currentChar, isPrivate);
            } catch (err) {
                console.error(err);
                addMessage("Errore di connessione con lo chef...", 'error', false);
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                swapBtn.disabled = false;
                sendBtn.textContent = 'Invia';
                input.value = "";
                input.focus();
            }
        }



        function addMessage(message, who, isPrivate=false){
            const respondsDiv = document.getElementById("answers");
            const msgElement = document.createElement('p');
            const privateTag = isPrivate ? " [sussurro]" : "";
            
            if (who && who !== 'User' && who !== false){
                msgElement.className = `msg-ai ${isPrivate ? 'msg-private' : ''}`;
                const label = document.createElement('span');
                label.className = 'msg-label';
                label.textContent = `${getDisplayName(who)}${privateTag}`;
                msgElement.appendChild(label);
                msgElement.appendChild(document.createTextNode(message));
            } else {
                msgElement.className = `msg-user ${isPrivate ? 'msg-private' : ''}`;
                const label = document.createElement('span');
                label.className = 'msg-label';
                label.textContent = `Tu${privateTag}`;
                msgElement.appendChild(label);
                msgElement.appendChild(document.createTextNode(message));
            }
            respondsDiv.appendChild(msgElement);
            scrollToBottom();
        }


        function scrollToBottom() {
            const respondsDiv = document.getElementById("answers");
            respondsDiv.scrollTop = respondsDiv.scrollHeight;
        }


        updateCharacterDisplay();
        scrollToBottom();

    </script>

</body>
</html>
